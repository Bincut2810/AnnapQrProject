<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Offline · Annap Coffee</title>
  <style>
    body { margin: 0; min-height: 100dvh; display: grid; place-items: center; background: #faf7f2; color: #2a2218;
      font-family: Georgia, "Times New Roman", serif; padding: 1.5rem; text-align: center; }
    p { max-width: 22rem; line-height: 1.6; color: #6b5f52; font-family: system-ui, sans-serif; font-size: 0.95rem; }
    h1 { font-weight: 500; font-size: 1.5rem; margin: 0 0 0.75rem; }
    .k { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: #8a7d6e; font-family: system-ui, sans-serif; }
    button { margin-top: 1.25rem; min-height: 2.75rem; padding: 0 1.5rem; border-radius: 999px; border: 0;
      background: #2a2218; color: #faf7f2; font-size: 0.875rem; cursor: pointer; }
    .lang { margin-top: 1rem; display: flex; justify-content: center; gap: 0.5rem; font-family: system-ui, sans-serif; font-size: 0.75rem; }
    .lang button { margin: 0; min-height: 2rem; padding: 0 0.75rem; background: transparent; color: #6b5f52; border: 1px solid rgba(107,95,82,.35); }
  </style>
</head>
<body>
  <main>
    <p class="k" id="offline-brand">Annap Coffee Atelier</p>
    <h1 id="offline-title">…</h1>
    <p id="offline-lede">…</p>
    <button type="button" id="offline-retry" onclick="location.reload()">…</button>
    <div class="lang" role="group" aria-label="Language">
      <button type="button" data-lang-set="en">EN</button>
      <button type="button" data-lang-set="vi">VI</button>
    </div>
  </main>
  <script src="/js/guest-i18n.js"></script>
  <script>
    function paintOffline() {
      if (!window.LuxuryI18n) return;
      document.getElementById("offline-brand").textContent = LuxuryI18n.t("home.brand");
      document.getElementById("offline-title").textContent = LuxuryI18n.t("errors.offlineTitle");
      document.getElementById("offline-lede").textContent = LuxuryI18n.t("errors.offlineLede");
      document.getElementById("offline-retry").textContent = LuxuryI18n.t("errors.retry");
      document.documentElement.lang = LuxuryI18n.getLang() === "vi" ? "vi" : "en";
    }
    (window.LuxuryI18n && LuxuryI18n.ready ? LuxuryI18n.ready : Promise.resolve()).then(paintOffline);
    window.addEventListener("luxury:i18n-changed", paintOffline);
    document.querySelectorAll("[data-lang-set]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        if (window.LuxuryI18n) LuxuryI18n.setLang(btn.getAttribute("data-lang-set"));
      });
    });
  </script>
</body>
</html>
